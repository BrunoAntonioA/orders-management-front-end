<div class="login">
  <div class="login__card card">
    <header class="login__header">
      <span class="login__logo" aria-hidden="true">OMS</span>
      <h1>Sign in</h1>
      <p>Use your Supabase account to access Order Manager.</p>
    </header>

    @if (error()) {
      <div class="login__error" role="alert">
        <p>{{ error() }}</p>
      </div>
    }

    <form class="login__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="username" />
        @if (isInvalid('email')) {
          <span class="form-field__error">Enter a valid email.</span>
        }
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
        @if (isInvalid('password')) {
          <span class="form-field__error">Password is required (min 6 characters).</span>
        }
      </div>

      <button type="submit" class="btn btn--primary login__submit" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>
